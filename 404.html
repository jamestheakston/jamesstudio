<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | James Studio</title>
    <!-- Tailwind CSS for high-fidelity styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Syne (geometric, wide header) & Space Grotesk (modern mono-ish clean body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #FAF9F6;
            color: #1A1A1A;
        }
        h1, h2, .geometric-font {
            font-family: 'Syne', sans-serif;
            letter-spacing: -0.03em;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #FAF9F6;
        }
        ::-webkit-scrollbar-thumb {
            background: #1A1A1A;
            border-radius: 3px;
        }
    </style>
</head>
<body class="antialiased selection:bg-[#1A1A1A] selection:text-[#FAF9F6] min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-[#FAF9F6]/90 backdrop-blur-md border-b border-[#1A1A1A]/10 px-6 py-4 md:px-12 flex justify-between items-center transition-all duration-300">
        <a href="/index.html" class="geometric-font text-xl md:text-2xl font-extrabold tracking-tighter flex items-center gap-2">
            JAMES<span class="text-xs bg-[#1A1A1A] text-[#FAF9F6] px-2 py-0.5 rounded-full uppercase tracking-widest">Studio</span>
        </a>
        
        <div class="hidden md:flex items-center gap-8 font-medium text-sm tracking-tight">
            <a href="/index.html#services" class="hover:text-black/60 transition-colors">Services</a>
            <a href="/index.html#work" class="hover:text-black/60 transition-colors">Selected Work</a>
            <a href="/index.html#about" class="hover:text-black/60 transition-colors">About Us</a>
            <a href="/index.html#contact" class="bg-[#1A1A1A] text-[#FAF9F6] px-5 py-2.5 rounded-full text-xs font-semibold tracking-wider hover:bg-neutral-800 transition-all shadow-sm">
                Get in Touch
            </a>
        </div>
    </nav>

    <!-- 404 Content -->
    <main class="flex-1 flex items-center justify-center px-6 md:px-12">
        <div class="max-w-2xl text-center space-y-8">
            <h1 class="text-8xl md:text-9xl font-extrabold tracking-tight text-[#1A1A1A]">404</h1>
            
            <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight">Page Not Found</h2>
            
            <p class="text-lg md:text-xl text-neutral-600 leading-relaxed max-w-lg mx-auto">
                The page you're looking for doesn't exist or has been moved. Let's get you back on track.
            </p>

            <div class="flex flex-col sm:flex-row gap-4 justify-center pt-6">
                <a href="/index.html" class="bg-[#1A1A1A] text-[#FAF9F6] px-8 py-4 rounded-full text-sm font-semibold tracking-wider hover:bg-neutral-800 transition-all transform hover:-translate-y-0.5">
                    Return Home
                </a>
                <a href="/index.html#work" class="border border-[#1A1A1A] text-[#1A1A1A] px-8 py-4 rounded-full text-sm font-semibold tracking-wider hover:bg-[#1A1A1A] hover:text-[#FAF9F6] transition-all transform hover:-translate-y-0.5">
                    View Our Work
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-[#1A1A1A]/10 py-12 px-6 md:px-12 bg-white">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-6">
            <p class="text-xs text-neutral-400">
                &copy; <span id="year">2026</span> James Studio. All rights engineered under geometric rules.
            </p>
            <div class="flex gap-6 text-xs text-neutral-500">
                <a href="#" class="hover:underline">Privacy Policy</a>
                <a href="#" class="hover:underline">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
